<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitya</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  canvas { pointer-events: none; background-color: #000; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  /* ── Admin Panel ── */
  #admin-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 1000;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    transition: background 0.2s;
  }
  #admin-toggle:hover { background: rgba(255,255,255,0.25); }

  #admin-panel {
    position: fixed; top: 0; right: -320px; z-index: 999;
    width: 320px; height: 100%; overflow-y: auto;
    background: rgba(18,18,18,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-left: 1px solid rgba(255,255,255,0.08);
    padding: 60px 20px 30px; color: #ccc;
    transition: right 0.3s ease;
    font-size: 12px;
  }
  #admin-panel.open { right: 0; }

  #admin-panel h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
    color: rgba(255,255,255,0.4); margin: 20px 0 12px; font-weight: 500;
  }
  #admin-panel h3:first-child { margin-top: 0; }

  .ctrl { margin-bottom: 14px; }
  .ctrl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .ctrl-label { font-size: 12px; color: rgba(255,255,255,0.7); }
  .ctrl-value { font-size: 11px; color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums; min-width: 32px; text-align: right; }

  .ctrl input[type="range"] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 3px;
    background: rgba(255,255,255,0.12); border-radius: 2px; outline: none;
  }
  .ctrl input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: #fff; cursor: pointer; border: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .ctrl-check { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; }
  .ctrl-check input { display: none; }
  .ctrl-check .box {
    width: 16px; height: 16px; border-radius: 3px;
    border: 1.5px solid rgba(255,255,255,0.3); position: relative;
    transition: background 0.15s, border-color 0.15s;
  }
  .ctrl-check input:checked + .box { background: #fff; border-color: #fff; }
  .ctrl-check input:checked + .box::after {
    content: ""; position: absolute; left: 4px; top: 1px;
    width: 5px; height: 9px; border: solid #111; border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .ctrl-check span:last-child { font-size: 12px; color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<!-- Admin Panel -->
<button id="admin-toggle" title="Settings">&#9881;</button>
<div id="admin-panel">
  <h3>Grid</h3>
  <div class="ctrl">
    <div class="ctrl-header"><span class="ctrl-label">Subdivisions</span><span class="ctrl-value" id="v-grid_size">8</span></div>
    <input type="range" data-key="grid_size" min="3" max="32" step="1" value="8">
  </div>
  <div class="ctrl">
    <div class="ctrl-header"><span class="ctrl-label">Cell Image Zoom</span><span class="ctrl-value" id="v-zoom">0%</span></div>
    <input type="range" data-key="zoom" min="-50" max="100" step="1" value="0">
  </div>

  <label class="ctrl-check">
    <input type="checkbox" data-key="flip_it">
    <span class="box"></span>
    <span>Flip Alternate Cells</span>
  </label>

  <h3>Turbulence</h3>
  <label class="ctrl-check">
    <input type="checkbox" data-key="stir_grid" checked>
    <span class="box"></span>
    <span>Turbulence</span>
  </label>
  <div class="ctrl">
    <div class="ctrl-header"><span class="ctrl-label">Stir Frequency</span><span class="ctrl-value" id="v-stir_freq">80%</span></div>
    <input type="range" data-key="stir_freq" min="0" max="100" step="1" value="80">
  </div>
  <div class="ctrl">
    <div class="ctrl-header"><span class="ctrl-label">Stir Strength</span><span class="ctrl-value" id="v-stir_strength">90%</span></div>
    <input type="range" data-key="stir_strength" min="0" max="100" step="1" value="90">
  </div>
  <div class="ctrl">
    <div class="ctrl-header"><span class="ctrl-label">Disorder</span><span class="ctrl-value" id="v-stir_disorder">78%</span></div>
    <input type="range" data-key="stir_disorder" min="0" max="100" step="1" value="78">
  </div>
  <div class="ctrl">
    <div class="ctrl-header"><span class="ctrl-label">Motion Elasticity</span><span class="ctrl-value" id="v-elasticity">86%</span></div>
    <input type="range" data-key="elasticity" min="0" max="100" step="1" value="86">
  </div>

  <h3>Mouse</h3>
  <label class="ctrl-check">
    <input type="checkbox" data-key="mouse_interaction" checked>
    <span class="box"></span>
    <span>Mouse Interaction</span>
  </label>
  <div class="ctrl">
    <div class="ctrl-header"><span class="ctrl-label">Mouse Movement Force</span><span class="ctrl-value" id="v-mouse_sensitivity">97%</span></div>
    <input type="range" data-key="mouse_sensitivity" min="0" max="100" step="1" value="97">
  </div>
  <div class="ctrl">
    <div class="ctrl-header"><span class="ctrl-label">Mouse Radius</span><span class="ctrl-value" id="v-tolerance">71%</span></div>
    <input type="range" data-key="tolerance" min="0" max="100" step="1" value="71">
  </div>
  <div class="ctrl">
    <div class="ctrl-header"><span class="ctrl-label">Mouseover Zoom</span><span class="ctrl-value" id="v-mouse_zoom">15%</span></div>
    <input type="range" data-key="mouse_zoom" min="-100" max="100" step="1" value="15">
  </div>
</div>

<script src="photo1_data.js"></script>
<script src="pixi.min.js"></script>
<script>
/**
 * Standalone adaptation of Cargo's pixelation/main module.
 * Uses PIXI v4.8.9 (local). All rendering logic taken directly
 * from the extracted pixelation.js source.
 */
(function(PIXI) {

  // ── Settings (from Cargo admin panel for burohaus) ──
  // ── Actual admin panel values (verified from screenshot) ──
  var settings = {
    hex: "#000000",
    alpha: 0,
    mouse_interaction: true,
    mouse_sensitivity: 97,   // Mouse Movement Force 97%
    image_url: "photo1.png",
    rows: 64,
    columns: 64,
    zoom: 0,                 // Cell Image Zoom 0%
    horiz_stretch: 100,
    vert_stretch: 97,
    layout_mode: "grid_mode",
    grid_size: 8,            // Subdivisions 8
    stir_grid: true,         // Turbulence ON
    stir_freq: 80,           // Stir Frequency 80%
    stir_strength: 90,       // Stir Strength 90%
    stir_disorder: 78,       // Disorder 78%
    elasticity: 86,          // Motion Elasticity 86%
    tolerance: 71,           // Mouse Radius 71%
    mouse_zoom: 15,          // Mouseover Zoom 15%
    flip_it: false,          // Flip Alternate Cells OFF
    size: "cover"
  };

  // ── State (mirrors this.data from Cargo's Backbone view) ──
  var data = {
    renderer: null,
    stage: null,
    texture: null,
    composition: null,
    sprites_num: 0,
    mouse_in: false,
    image_size: { width: 100, height: 100 },
    row_num: 1,
    col_num: 1,
    mouse_vector: [{ x: 0, y: 0 }, { x: 0, y: 0 }],
    texture_size: { width: 100, height: 100 },
    is_mobile: false,
    image_loaded: false,
    model_speed: { x: 0, y: 0 },
    lastClientPos: { x: 0, y: 0 },
    skip_delta: false,
    mouse_sensitivity: 0,
    backdrop_size: { w: 800, h: 600, top: 0, left: 0, resolution: 1 },
    movement_offset: { x: 0, y: 0 },
    mouse_prev: { x: -1, y: -1 },
    mouse_cur: { x: 0, y: 0 },
    mouse_cache: { x: 0, y: 0 },
    mouse_delta: { x: 0, y: 0, smooth_x: 0, smooth_y: 0, long_tail: 0 },
    elasticity: settings.elasticity
  };

  var counter = 0;
  var mouse_calced = false;
  var drawFrameID = null;

  // ── Init (mirrors Cargo's Init method) ──
  function Init() {
    // WebGL renderer. On https:// works directly with images.
    // On file:// needs base64-embedded image (photo1_data.js) to avoid CORS taint.
    data.renderer = PIXI.autoDetectRenderer(800, 600, {
      transparent: true,
      antialias: false,
      resolution: 1
    });
    data.stage = new PIXI.Container;
    data.composition = new PIXI.Container;
    data.stage.addChild(data.composition);

    document.body.appendChild(data.renderer.view);

    // Background color
    data.renderer.backgroundColor = parseInt(settings.hex.replace("#", "0x"));
    data.stage.alpha = 1 - settings.alpha;

    // Mouse sensitivity (exact Cargo formula)
    data.mouse_sensitivity = 0.05 * Math.pow(0.01 * settings.mouse_sensitivity, 2);

    // Events
    var isMobile = 'ontouchstart' in window;
    if (isMobile) {
      data.is_mobile = true;
      window.addEventListener("touchmove", updateMouseOffset, { passive: true });
      data.mouse_in = false;
    } else {
      window.addEventListener("mousemove", updateMouseOffset);
      document.body.addEventListener("mouseenter", function() {
        data.mouse_in = true;
        data.backdrop_size.left = 0;
      });
      document.body.addEventListener("mouseleave", function() {
        data.mouse_in = false;
      });
    }

    window.addEventListener("resize", function() { updateWindow(false); });

    updateWindow(true);
    loadImage();
  }

  // ── loadImage ──
  // Fixes for file:// protocol:
  // 1. Load via <img> + draw to canvas (bypasses XHR/CORS)
  // 2. Scale down to fit WebGL max texture size (photo is 2800x4200, limit often 4096)
  function loadImage() {
    console.log("[pixelation] loadImage start");
    var img = new Image;
    img.onload = function() {
      console.log("[pixelation] image loaded:", img.naturalWidth, "x", img.naturalHeight);

      data.image_size.width = img.naturalWidth;
      data.image_size.height = img.naturalHeight;
      data.texture_size = { width: img.naturalWidth, height: img.naturalHeight };

      // Create texture directly from the Image element
      var baseTexture = new PIXI.BaseTexture(img);
      baseTexture.scaleMode = PIXI.SCALE_MODES.LINEAR;
      data.texture = new PIXI.Texture(baseTexture);

      data.image_loaded = true;
      updateWindow(true);
      makeSprites();
      console.log("[pixelation] sprites created:", data.composition.children.length);
      Resume();
      console.log("[pixelation] animation started");
    };
    img.onerror = function() {
      console.error("[pixelation] FAILED to load image: " + settings.image_url);
    };
    // Use embedded base64 data URL if available (for file:// protocol),
    // otherwise fall back to file path (for http:// server)
    img.src = window.PHOTO_DATA || settings.image_url;
  }

  // ── makeSprites (exact Cargo code) ──
  function makeSprites() {
    var e, i = data.row_num = settings.rows,
        o = data.col_num = settings.columns,
        s = settings.grid_size,
        n = settings.layout_mode,
        r = 0;

    if ("grid_mode" == n) {
      data.row_num = i = s;
      data.col_num = o = s;
    } else if ("row_mode" == n) {
      data.col_num = o = 1;
    } else if ("column_mode" == n) {
      data.row_num = i = 1;
    }

    var d = i * o,
        m = data.composition.children.length,
        h = d - m;

    if (h < 0) {
      for (var l = m - 1; l > d - 1; l--) data.composition.removeChildAt(l);
    } else if (h > 0) {
      for (var l = m; l < d; l++) {
        e = new PIXI.Sprite;
        data.composition.addChild(e);
      }
    }

    for (var l = 0; l < o; l++) {
      for (var u = 0; u < i; u++) {
        e = data.composition.children[r];
        e.anchor = { x: 0.5, y: 0.5 };
        e.coords = { x: l, y: u };
        e.max_frame = { x: 0, y: 0, w: 1, h: 1 };
        e.min_frame = { x: 0, y: 0, w: 1, h: 1 };
        e.base_frame = { x: 0, y: 0, w: 1, h: 1 };
        e.zoom_in_min_frame = { x: 0, y: 0, w: 1, h: 1 };
        e.zoom_in_max_frame = { x: 0, y: 0, w: 1, h: 1 };
        e.movement = { x: 0, y: 0 };
        e.mouse_over = false;
        e.mouse_zoom = 0;
        e.animating = false;
        e.speed = { x: 0, y: 0 };
        e.interactive = true;
        r++;
      }
    }

    setSpritePosition();
    resizeImage();
  }

  // ── setSpritePosition (exact Cargo code for grid_mode) ──
  function setSpritePosition() {
    if (!data.image_loaded || data.composition.children.length === 0) return;

    var a, i, o, s, n, r, d, m, h, l, u, c, _, f, p, x, v, g, y, w,
        b = data.texture_size.width,
        z = data.texture_size.height,
        M = settings.rows,
        C = settings.columns,
        k = settings.grid_size,
        I = settings.layout_mode,
        E = 0,
        L = 0,
        P = 0.01 * settings.zoom,
        T = settings.flip_it,
        S = [];

    if (T) {
      if ("grid_mode" == I) S = [[-1, 1], [-1, 1]];
      else if ("row_mode" == I) S = [[1, 1], [-1, 1]];
      else if ("column_mode" == I) S = [[-1, 1], [1, 1]];
    } else {
      S = [[1, 1], [1, 1]];
    }

    var h_zoom, v_zoom, tex_cell_w, tex_cell_h;

    if ("grid_mode" == I) {
      M = k; C = k;
      E = Math.max(1 - (k - 3) / 29 * 2, 0);
      L = 0.5 * (1 - (k - 3) / 29) + 0.5;
      if (P < 0) P *= L;
      h_zoom = P; v_zoom = P;
      f = tex_cell_w = b / (C + 2);
      p = tex_cell_h = z / (M + 2);
    } else if ("row_mode" == I) {
      C = 1;
      E = Math.max(1 - (M - 3) / 59 * 2, 0);
      L = 0.5 * (1 - (M - 3) / 59) + 0.5;
      if (P < 0) P *= L;
      h_zoom = 0; v_zoom = P;
      tex_cell_w = b;
      f = 0;
      p = tex_cell_h = z / (M + 2);
    } else if ("column_mode" == I) {
      M = 1;
      E = Math.max(1 - (C - 3) / 59 * 2, 0);
      L = 0.5 * (1 - (C - 3) / 59) + 0.5;
      if (P < 0) P *= L;
      h_zoom = P; v_zoom = 0;
      tex_cell_w = b / (C + 2);
      f = tex_cell_w;
      p = 0;
      tex_cell_h = z;
    }

    s = 1 / b;
    n = 1 / z;

    for (var R = 0; R < M * C; R++) {
      w = data.composition.children[R];
      x = (1 == C) ? 0.5 : w.coords.x / (C - 1);
      v = (1 == M) ? 0.5 : w.coords.y / (M - 1);
      g = Math.sin(x * Math.PI);
      y = Math.sin(v * Math.PI);
      m = f + 1 / b;
      h = p + 1 / z;
      r = f + w.coords.x * tex_cell_w;
      d = p + w.coords.y * tex_cell_h;
      i = r + tex_cell_w / 2 + 0.5 * -s;
      o = d + tex_cell_h / 2 + 0.5 * -n;

      if (h_zoom > 0) {
        l = h_zoom * i + (1 - h_zoom) * r;
        c = h_zoom * s + (1 - h_zoom) * m;
      } else {
        l = -h_zoom * tex_cell_w + (1 + h_zoom) * r;
        c = -h_zoom * (b - 2 * tex_cell_w) + (1 + h_zoom) * m;
      }

      if (v_zoom > 0) {
        u = v_zoom * o + (1 - v_zoom) * d;
        _ = v_zoom * n + (1 - v_zoom) * h;
      } else {
        u = -v_zoom * tex_cell_h + (1 + v_zoom) * d;
        _ = -v_zoom * (z - 2 * tex_cell_h) + (1 + v_zoom) * h;
      }

      if ("grid_mode" == I) {
        w.min_frame = {
          x: Math.max(0, (l - 0.5 * b * g) * (1 - E) + (l - 0.5 * b) * E),
          y: Math.max(0, (u - 0.5 * z * y) * (1 - E) + (u - 0.5 * z) * E),
          w: c, h: _
        };
        w.max_frame = {
          x: Math.min((l + 0.5 * b * g) * (1 - E) + (l + 0.5 * b) * E, b - c),
          y: Math.min((u + 0.5 * z * y) * (1 - E) + (u + 0.5 * z) * E, z - _),
          w: c, h: _
        };
        w.base_frame = { x: l, y: u, w: c, h: _ };
        w.zoom_in_frame_base = { x: i, y: o, w: s, h: n };
        w.zoom_in_min_frame = { x: 0, y: 0, w: s, h: n };
        w.zoom_in_max_frame = { x: b - s, y: z - o, w: s, h: n };
        w.zoom_out_frame = { x: 0, y: 0, w: b, h: z };
      } else if ("row_mode" == I) {
        w.min_frame = { x: 0, y: Math.max(0, (u - 0.5 * z * y) * (1 - E) + (u - 0.5 * z) * E), w: b, h: _ };
        w.max_frame = { x: 0, y: Math.min((u + 0.5 * z * y) * (1 - E) + (u + 0.5 * z) * E, z - _), w: b, h: _ };
        w.base_frame = { x: 0, y: u, w: b, h: _ };
        w.zoom_in_frame_base = { x: 0, y: o, w: b, h: n };
        w.zoom_in_min_frame = { x: 0, y: 0, w: b, h: n };
        w.zoom_in_max_frame = { x: 0, y: z - o, w: b, h: n };
        w.zoom_out_frame = { x: 0, y: 0, w: b, h: z };
      } else if ("column_mode" == I) {
        w.min_frame = { x: Math.max(0, (l - 0.5 * b * g) * (1 - E) + (l - 0.5 * b) * E), y: 0, w: c, h: z };
        w.max_frame = { x: Math.min((l + 0.5 * b * g) * (1 - E) + (l + 0.5 * b) * E, b - c), y: 0, w: c, h: z };
        w.base_frame = { x: l, y: 0, w: c, h: z };
        w.zoom_in_frame_base = { x: i, y: 0, w: s, h: z };
        w.zoom_in_min_frame = { x: 0, y: 0, w: s, h: z };
        w.zoom_in_max_frame = { x: b - s, y: 0, w: s, h: z };
        w.zoom_out_frame = { x: 0, y: 0, w: b, h: z };
      }

      a = new PIXI.Rectangle(w.base_frame.x, w.base_frame.y, w.base_frame.w, w.base_frame.h);
      w.texture = new PIXI.Texture(data.texture.baseTexture, a);
      w.width = data.backdrop_size.w / C * S[0][w.coords.x % 2];
      w.height = data.backdrop_size.h / M * S[1][w.coords.y % 2];
      w.position = {
        x: Math.abs(w.width * w.coords.x) + 0.5 * Math.abs(w.width),
        y: Math.abs(w.height * w.coords.y) + 0.5 * Math.abs(w.height)
      };
    }
  }

  // ── resizeImage (exact Cargo code) ──
  function resizeImage() {
    if (!data.image_loaded) return;

    var e = 0, t = 0, a = 0, i = 0, o = null,
        s = {
          h: data.backdrop_size.h + 4,
          w: data.backdrop_size.w + 4
        },
        n = {
          y: data.image_size.width / data.image_size.height,
          x: data.image_size.height / data.image_size.width
        };

    o = s.w / s.h < n.y;
    if (o) {
      e = Math.ceil(s.h);
      t = Math.ceil(s.h * n.y);
    } else {
      e = Math.ceil(s.w * n.x);
      t = Math.ceil(s.w);
    }
    a = Math.ceil((s.h - e) / 2 - 2);
    i = Math.ceil((s.w - t) / 2 - 2);

    data.composition.width = t;
    data.composition.height = e;
    data.composition.x = i;
    data.composition.y = a;
  }

  // ── stirPixels (exact Cargo code) ──
  function stirPixels() {
    if (data.composition.children.length === 0 || !settings.stir_grid) return;

    var t, a = data.composition.children.length,
        i = 0.05 * settings.stir_freq,
        o = 0.1 * settings.stir_disorder + 1,
        s = 0.001 * settings.stir_strength * 0.25,
        n = Math.sin(0.005 * i * counter),
        r = Math.cos(0.005 * i * counter);

    if ("grid_mode" == settings.layout_mode) {
      for (var d = 0; d < a; d++) {
        t = data.composition.children[d];
        r = Math.sin(r + (o - 1) * d * 10);
        t.speed.x += (Math.sin(0.003 * counter * i + 0.1 * (t.coords.x + r * t.coords.y * 0.5 * o)) * r + Math.cos(-0.0031 * counter * i + -0.1 * (t.coords.x - r * t.coords.y * 0.5 * o) + 0.7) * n) * s;
        t.speed.y += (Math.sin(0.0031 * counter * i + 0.1 * (t.coords.y - r * t.coords.x * 0.5 * o)) * r + Math.cos(-0.003 * counter * i + -0.1 * (t.coords.y - r * t.coords.x * 0.5 * o) + 0.7) * n) * s;
      }
    } else {
      for (var d = 0; d < a; d++) {
        t = data.composition.children[d];
        r = Math.sin(r + (o - 1) * d * 10);
        t.speed.x += (Math.sin(0.009 * counter * i + 0.1 * (t.coords.x + r * t.coords.y * 0.5 * o * 40)) * r + Math.cos(-0.0091 * counter * i + -0.1 * (t.coords.x - r * t.coords.y * 0.5 * o * 40) + 0.7) * n) * s * 2;
        t.speed.y += (Math.sin(0.0091 * counter * i + 0.1 * (t.coords.y - r * t.coords.x * 0.5 * o * 40)) * r + Math.cos(-0.009 * counter * i + -0.1 * (t.coords.y - r * t.coords.x * 0.5 * o * 40) + 0.7) * n) * s * 2;
      }

  // ── animateFrame (exact Cargo code) ──

      h = 0;
      l = { x: 0, y: 0 };

        l.y += data.composition.children[g].movement.y;

      if (Math.floor(y % m) != m - 1 && Math.floor(y % m) > -1 && y >= 0) {

        l.y += data.composition.children[y].movement.y;
        h++;
      }
      if (x < d) {
        l.x += data.composition.children[x].movement.x;
        l.y += data.composition.children[x].movement.y;
        h++;
      }
      if (v >= 0) {

        l.y += data.composition.children[v].movement.y;

        e.movement.y = l.y / h * f + e.speed.y * (1 - f);

      c = Math.abs(e.movement.y);

          z = 0.5 * e.movement.x + 0.5,
          M = 0.5 * e.movement.y + 0.5;

  // ── spriteMouseMove (exact Cargo code) ──

        i = data.col_num,
        o = data.backdrop_size.w,
        s = data.backdrop_size.h,
        n = data.composition.position.x,
        r = data.composition.position.y,

  }

  // ── updateMouseOffset (exact Cargo code) ──
  function updateMouseOffset(e) {
    if (mouse_calced || !settings.mouse_interaction) return;

    data.mouse_prev = { x: data.mouse_cur.x, y: data.mouse_cur.y };

    if (data.is_mobile && e) {
      data.mouse_cur = {
        x: (e.layerX || e.touches[0].clientX) - data.backdrop_size.left,
        y: (e.layerY || e.touches[0].clientY) - data.backdrop_size.top

    } else if (e) {
      if (data.lastClientPos.x === e.clientX && data.lastClientPos.y === e.clientY) return;
      data.lastClientPos.x = e.clientX;
      data.lastClientPos.y = e.clientY;
      data.mouse_in = true;
      data.mouse_cur = {
        x: e.clientX - data.backdrop_size.left,
        y: e.clientY - data.backdrop_size.top
      };
    }

    mouse_calced = true;
  }

  // ── setMouseDelta (exact Cargo code) ──
  function setMouseDelta() {

      y: data.mouse_cur.y - data.mouse_prev.y

      data.mouse_prev.x = data.mouse_cur.x;
      e.x = 0;
    }
    if (data.mouse_cache.y == data.mouse_cur.y) {
      data.mouse_prev.y = data.mouse_cur.y;
      e.y = 0;

    data.mouse_cache.y = data.mouse_cur.y;

  // ── updateWindow (exact Cargo logic — only calls resizeImage, NOT setSpritePosition) ──

  // ── Resume / draw loop (exact Cargo code) ──

  }

  function draw() {
    drawFrameID = window.requestAnimationFrame(draw);
    updateWindow(false);
    setMouseDelta();
    stirPixels();
    spriteMouseMove();
    animateFrame();
    counter++;
    data.renderer.render(data.stage);
    mouse_calced = false;
  }

  // ── Update (mirrors Cargo's Update method) ──
  function Update(key, val) {
    if (settings[key] === val) return;
    settings[key] = val;

    if (key === "grid_size" || key === "flip_it") {
      if (!data.image_loaded) return;
      makeSprites();
    }
    if (key === "zoom") {
      setSpritePosition();
      resizeImage();
    }
    if (key === "elasticity") {
      data.elasticity = val;
    }
    if (key === "mouse_sensitivity") {

// ── Admin Panel Controls ──
(function() {
  var toggle = document.getElementById("admin-toggle");
  var panel = document.getElementById("admin-panel");

  toggle.addEventListener("click", function() {
    panel.classList.toggle("open");
  });

  // Sliders
  panel.querySelectorAll('input[type="range"]').forEach(function(input) {
    var key = input.dataset.key;
    var valueEl = document.getElementById("v-" + key);
    var isPercent = ["stir_freq","stir_strength","stir_disorder","elasticity","mouse_sensitivity","tolerance","mouse_zoom","zoom"].indexOf(key) !== -1;

    input.addEventListener("input", function() {
      var val = parseFloat(input.value);
      if (valueEl) valueEl.textContent = isPercent ? val + "%" : val;
      window._pixUpdate(key, val);
    });
  });

  // Checkboxes
  panel.querySelectorAll('input[type="checkbox"]').forEach(function(input) {
    var key = input.dataset.key;
    input.addEventListener("change", function() {
      window._pixUpdate(key, input.checked);
    });
  });
})();
</script>
